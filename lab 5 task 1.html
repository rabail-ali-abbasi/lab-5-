<!DOCTYPE html> 
<html> 
<head> 
    <title>Basic Calculator</title> 

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, skyblue,skyblue);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculator {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px black;
            text-align: center;
            width: 350px;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid white;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            background-color: blue;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color:blue;
            transform: scale(1.05);
        }

        #result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head> 

<body> 

<div class="calculator">
    <h2>Basic Calculator</h2> 

    <input type="number" id="num1" placeholder="Enter First Number"> 
    <input type="number" id="num2" placeholder="Enter Second Number"> 

    <br>

    <button onclick="calculate('+')">Add</button> 
    <button onclick="calculate('-')">Subtract</button> 
    <button onclick="calculate('*')">Multiply</button> 
    <button onclick="calculate('/')">Divide</button>

    <h3 id="result"></h3> 
</div>

<script> 
function calculate(operator){ 

    let n1 = document.getElementById("num1").value; 
    let n2 = document.getElementById("num2").value; 
    let resultElement = document.getElementById("result");
    if (n1 === "" || n2 === "") {
        resultElement.innerHTML = "Error: Please enter both numbers!";
        resultElement.style.color = "red";
        return;
    }

    n1 = Number(n1);
    n2 = Number(n2);
    let result;

    if (operator === "+") {
        result = n1 + n2;
        resultElement.innerHTML = "Sum = " + result;
    } 
    else if (operator === "-") {
        result = n1 - n2;
        resultElement.innerHTML = "Difference = " + result;
    } 
    else if (operator === "*") {
        result = n1 * n2;
        resultElement.innerHTML = "Product = " + result;
    } 
    else if (operator === "/") {

        if (n2 === 0) {
            resultElement.innerHTML = "Error: Cannot divide by zero!";
            resultElement.style.color = "red";
            return;
        }

        result = n1 / n2;
        resultElement.innerHTML = "Quotient = " + result;
    }

    resultElement.style.color = "green";
}
</script> 
 
</body> 
</html>
